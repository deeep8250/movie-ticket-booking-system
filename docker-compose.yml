services:
 app:
  build: .
  ports:
   - "8000:8080"
  env_file:
   - .env
  depends_on:
   - db
   - redis


 db:
  image: postgres:15-alpine
  ports:
   - "5432:5432"
  environment:
   POSTGRES_USER: ${DB_USER}
   POSTGRES_PASSWORD: ${DB_PASSWORD}
   POSTGRES_DB: ${DB_NAME}
  volumes:
   - postgres_data:/var/lib/postgresql/data
     
 redis:
   image: redis:7-alpine
   command: ["redis-server","--requirepass","${REDIS_PASSWORD}"]
volumes:
   postgres_data: